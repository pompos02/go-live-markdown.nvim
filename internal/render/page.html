        if (target) return target;
        if (decoded !== fragment) {
          return document.getElementById(fragment);
        }
        return null;
      }

      function updateHashWithoutNativeScroll(href) {
        if (!href || href.charAt(0) !== "#") return;
        if (!window.history) return;

        if (typeof window.history.replaceState === "function") {
          window.history.replaceState(null, "", href);
        }
      }

      function stopFollowAnimation() {
        if (followRaf) {
          cancelAnimationFrame(followRaf);
          followRaf = 0;
        }
        followLastTs = 0;
      }

      function suppressAutoFollow(ms) {
        var cooldown = Number(ms);
        if (!Number.isFinite(cooldown)) {
          cooldown = MANUAL_SCROLL_COOLDOWN_MS;
        }
        cooldown = Math.max(MANUAL_SCROLL_COOLDOWN_MS, cooldown);
        manualScrollCooldownUntil = performance.now() + cooldown;
        followTargetTop = getScrollTop();
        stopFollowAnimation();
      }

      function markManualScrollIntent() {
        suppressAutoFollow(MANUAL_SCROLL_COOLDOWN_MS);
      }

      function isScrollKey(event) {
        return !!(event && SCROLL_KEYS[event.key]);
      }

      function stepFollow(ts) {
        if (followTargetTop === null) {
          stopFollowAnimation();
          return;
        }

        if (followLastTs === 0) {
          followLastTs = ts;
        }

        var dt = Math.max(1 / 120, Math.min(1 / 20, (ts - followLastTs) / 1000));
        followLastTs = ts;

        var targetTop = clampScrollTop(followTargetTop);
        var currentTop = getScrollTop();
        var distance = targetTop - currentTop;

        if (Math.abs(distance) < FOLLOW_SNAP_DISTANCE_PX) {
          scrollWindowToTop(targetTop);
          stopFollowAnimation();
          return;
        }

        var distanceAbs = Math.abs(distance);
        var t = Math.min(1, distanceAbs / 1200);
        var responsiveness = 8 + 10 * t;
        var maxSpeed = 22200 + 7800 * t * t;

        var alpha = 1 - Math.exp(-responsiveness * dt);
        var unclampedStep = distance * alpha;
        var maxStep = maxSpeed * dt;
        var step = Math.max(-maxStep, Math.min(maxStep, unclampedStep));
        var nextTop = clampScrollTop(currentTop + step);

        scrollWindowToTop(nextTop);
        followRaf = requestAnimationFrame(stepFollow);
      }

      function animateToScrollTop(top, force) {
        var clampedTop = clampScrollTop(top);
        followTargetTop = clampedTop;

        if (force) {
          stopFollowAnimation();
          scrollWindowToTop(clampedTop);
          return;
        }

        if (followRaf === 0) {
          followRaf = requestAnimationFrame(stepFollow);
        }
      }

      function targetTopForElement(target) {
        var viewport = window.innerHeight || document.documentElement.clientHeight;
        var absoluteTop = getScrollTop() + target.getBoundingClientRect().top;
        return absoluteTop - viewport * FOLLOW_RATIO;
      }

      function targetTopByLineRatio(line) {
        if (lineMap.length === 0) return getScrollTop();

        var maxLine = Math.max(lineMap[lineMap.length - 1].line, 1);
        var ratio = Math.max(0, Math.min(1, line / maxLine));
        return maxScrollTop() * ratio;
      }

      function outsideComfortZone(targetEl) {
        if (!targetEl) return true;

        var viewport = window.innerHeight || document.documentElement.clientHeight;
        var comfortTopPx = viewport * COMFORT_TOP;
        var comfortBottomPx = viewport * (1 - COMFORT_BOTTOM);
        var rect = targetEl.getBoundingClientRect();

        return rect.top < comfortTopPx || rect.bottom > comfortBottomPx;
      }

      function pickTarget(line) {
        if (lineMap.length === 0) return null;

        if (line <= lineMap[0].line) return lineMap[0];
        var last = lineMap[lineMap.length - 1];
        if (line >= last.line) return last;

        var left = 0;
        var right = lineMap.length - 1;
        var candidate = lineMap[0];

        while (left <= right) {
          var mid = (left + right) >> 1;
          var cur = lineMap[mid];

          if (cur.line <= line) {
            candidate = cur;
            left = mid + 1;
            continue;
          }

          right = mid - 1;
        }

        return candidate;
      }

      function setActiveLine(nextEl) {
        if (activeLineEl === nextEl) return;

        if (activeLineEl) {
          activeLineEl.classList.remove("is-cursor-line");
        }

        activeLineEl = nextEl || null;
        if (activeLineEl) {
          activeLineEl.classList.add("is-cursor-line");
        }
      }

      function highlightLine(line) {
        var target = pickTarget(line);
        if (!target || !target.el) {
          setActiveLine(null);
          return null;
        }

        setActiveLine(target.el);
        return target;
      }

      function scrollToLine(line, force) {
        var target = highlightLine(line);
        if (!force && performance.now() < manualScrollCooldownUntil) return;
        if (!force && target && target.el && !outsideComfortZone(target.el)) return;

        var top = target && target.el ? targetTopForElement(target.el) : targetTopByLineRatio(line);

        animateToScrollTop(top, !!force);
      }

      function handleRenderMessage(msg) {
        stopFollowAnimation();
        followTargetTop = null;
        setActiveLine(null);

        root.innerHTML = typeof msg.html === "string" ? msg.html : "";
        renderTOC(normalizeTOCItems(msg.toc));
        currentFilename = normalizeFilename(msg.filename);
        if (filenameEl) {
          filenameEl.textContent = currentFilename;
        }
        updateTitle();

        latestRev = toInt(msg.rev, latestRev);
        enableTaskListCheckboxes(root);
        syncCodeBlockLanguages(root);
        refreshHeadingFolds(root);
        buildTOCHeadingMap();
        buildLineMap();
        typesetMath(root);

        if (pendingRenderScrollTop !== null) {
          var restoreTop = clampScrollTop(pendingRenderScrollTop);
          pendingRenderScrollTop = null;
          scrollWindowToTop(restoreTop);
          followTargetTop = restoreTop;
          scheduleTOCActiveSync();
          return;
        }

        if (lastCursorLine !== null) {
          scrollToLine(lastCursorLine, false);
          syncTOCActiveFromLine(lastCursorLine, true);
          return;
        }

        scheduleTOCActiveSync();
      }

      function handleCursorMessage(msg) {
        var rev = toInt(msg.rev, 0);
        if (rev !== latestRev) return;

        var line = toInt(msg.line, 1);
        if (lastCursorLine !== null && lastCursorLine === line) return;

        lastCursorLine = line;
        scrollToLine(line, false);
        syncTOCActiveFromLine(line, true);
      }

      function scheduleReconnect() {
        if (retryTimer) {
          clearTimeout(retryTimer);
        }
        retryTimer = setTimeout(connect, RECONNECT_DELAY_MS);
      }

      function connect() {
        var proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        var url = proto + "//" + window.location.host + "/ws";
        socket = new WebSocket(url);

        socket.onopen = function () {
          if (retryTimer) {
            clearTimeout(retryTimer);
            retryTimer = 0;
          }
          setConnectionState(true);
        };

        socket.onmessage = function (event) {
          var msg;
          try {
            msg = JSON.parse(event.data);
          } catch (_) {
            return;
          }

          if (!msg || typeof msg.type !== "string") return;
          if (msg.type === "render") {
            handleRenderMessage(msg);
            return;
          }

          if (msg.type === "cursor") {
            handleCursorMessage(msg);
          }
        };

        socket.onerror = function () {
          setConnectionState(false);
          socket.close();
        };

        socket.onclose = function () {
          setConnectionState(false);
          scheduleReconnect();
        };
      }

      function isInteractiveTarget(el) {
        return !!(el && el.closest(SELECTOR_INTERACTIVE));
      }

      function handleWikilinkClick(event) {
        if (!event || event.defaultPrevented) return;

        var anchor = closestFromEvent(event, SELECTOR_WIKILINK);
        if (!(anchor instanceof HTMLAnchorElement)) return;

        event.preventDefault();
      }

      function pickLineElementFromEvent(event) {
        var lineEl = closestFromEvent(event, SELECTOR_LINE);
        if (lineEl) return lineEl;

        if (!event) return null;
        var fromPoint = document.elementFromPoint(event.clientX, event.clientY);
        var fromPointEl = toElement(fromPoint);
        return fromPointEl ? fromPointEl.closest(SELECTOR_LINE) : null;
      }

      function sendGoToLine(line) {
        if (!Number.isFinite(line) || line < 1) return;
        if (!socket || socket.readyState !== WebSocket.OPEN) return;

        socket.send(
          JSON.stringify({
            type: "go_to_line",
            line: line,
            col: 1,
            rev: latestRev,
          })
        );
      }

      function sendToggleCheckbox(line) {
        if (!Number.isFinite(line) || line < 1) return;
        if (!socket || socket.readyState !== WebSocket.OPEN) return;

        suppressAutoFollow(MANUAL_SCROLL_COOLDOWN_MS);
        pendingRenderScrollTop = getScrollTop();
        socket.send(
          JSON.stringify({
            type: "toggle_checkbox",
            line: line,
            rev: latestRev,
          })
        );
      }

      function handleCheckboxClick(event) {
        if (!isPrimaryPlainClick(event)) return;

        var checkbox = closestFromEvent(event, 'input[type="checkbox"]');
        if (!(checkbox instanceof HTMLInputElement)) return;

        var lineEl = checkbox.closest(SELECTOR_LINE);
        if (!lineEl) return;

        var line = toInt(lineEl.getAttribute("data-md-line"), NaN);
        if (!Number.isFinite(line) || line < 1) return;

        event.preventDefault();
        event.stopPropagation();
        sendToggleCheckbox(line);
      }

      function foldableHeadingFromAnchor(anchor) {
        if (!(anchor instanceof HTMLAnchorElement)) return null;

        var heading = anchor.closest(SELECTOR_FOLDABLE_HEADING);
        if (!(heading instanceof HTMLElement)) return null;
        if (headingAnchorEl(heading) !== anchor) return null;
        if (anchor.getAttribute("data-fold-toggle") !== "true") return null;
        return heading;
      }

      function navigateToHashAnchor(href) {
        var fragmentHref = normalizeHashHref(href);
        if (!fragmentHref) return false;

        var nextTop = 0;
        if (fragmentHref !== "#") {
          var target = lookupHashTarget(fragmentHref.slice(1));
          if (!(target instanceof HTMLElement)) return false;
          expandCollapsedAncestorsForNode(target);
          if (isHeadingElement(target) && target.id) {
            setActiveTOCId(target.id, { reveal: true });
          }
          nextTop = topForStartAlignedElement(target);
        }

        suppressAutoFollow(HEADING_NAV_COOLDOWN_MS);
        updateHashWithoutNativeScroll(fragmentHref);
        scrollWindowToTop(nextTop);
        suppressAutoFollow(HEADING_NAV_COOLDOWN_MS);
        return true;
      }

      function handleHashLinkClick(event) {
        if (!isPrimaryPlainClick(event)) return;

        var anchor = closestFromEvent(event, SELECTOR_HASH_LINK);
        if (!(anchor instanceof HTMLAnchorElement)) return;

        var foldHeading = foldableHeadingFromAnchor(anchor);
        if (foldHeading) {
          event.preventDefault();
          event.stopPropagation();
          toggleHeadingFold(foldHeading);
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        var href = anchor.getAttribute("href") || "";
        navigateToHashAnchor(href);
      }

      function handleTOCClick(event) {
        if (!isPrimaryPlainClick(event)) return;

        var anchor = closestFromEvent(event, SELECTOR_TOC_LINK);
        if (!(anchor instanceof HTMLAnchorElement)) return;
        if (!tocEl || !tocEl.contains(anchor)) return;

        event.preventDefault();
        event.stopPropagation();

        var id = anchor.getAttribute("data-id") || "";
        if (id) {
          setActiveTOCId(id, { reveal: true });
        }

        var href = anchor.getAttribute("href") || "";
        if (navigateToHashAnchor(href)) return;

        var line = toInt(anchor.getAttribute("data-line"), NaN);
        if (!Number.isFinite(line) || line < 1) return;

        suppressAutoFollow(HEADING_NAV_COOLDOWN_MS);
        scrollToLine(line, true);
        syncTOCActiveFromLine(line, true);
      }

      function pickHeadingFromEvent(event) {
        var heading = closestFromEvent(event, SELECTOR_HEADING);
        if (!(heading instanceof HTMLElement)) return null;
        return heading;
      }

      function clearHeadingClickTimer() {
        if (!headingClickTimer) return;
        clearTimeout(headingClickTimer);
        headingClickTimer = 0;
      }

      function headingTextHit(heading, event) {
        if (!heading || !event || !document.createRange) return false;

        var range = document.createRange();
        range.selectNodeContents(heading);
        var rects = range.getClientRects();
        if (!rects || rects.length === 0) return false;

        var x = event.clientX;
        var y = event.clientY;
        for (var i = 0; i < rects.length; i++) {
          var rect = rects[i];
          if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            return true;
          }
        }

        return false;
      }

      function navigateToHeadingAnchor(heading) {
        if (!heading) return;

        var anchorEl = heading.querySelector("a.anchor[href^='#']");
        var href = anchorEl ? anchorEl.getAttribute("href") : "";
        if (!href && heading.id) {
          href = "#" + heading.id;
        }
        navigateToHashAnchor(href);
      }

      function handleHeadingClick(event) {
        if (!isPrimaryPlainClick(event)) return;

        var targetEl = eventTargetElement(event);
        if (isInteractiveTarget(targetEl)) return;

        var heading = pickHeadingFromEvent(event);
        if (!heading) return;
        if (!headingTextHit(heading, event)) return;
        if (event.detail > 1) return;

        event.preventDefault();
        clearHeadingClickTimer();
        headingClickTimer = setTimeout(function () {
          headingClickTimer = 0;
          navigateToHeadingAnchor(heading);
        }, HEADING_CLICK_DELAY_MS);
      }

      function handlePreviewDoubleClick(event) {
        clearHeadingClickTimer();
        if (!isPrimaryPlainClick(event)) return;

        var targetEl = eventTargetElement(event);

        if (isInteractiveTarget(targetEl)) return;

        var lineEl = pickLineElementFromEvent(event);
        if (!lineEl) return;

        var line = toInt(lineEl.getAttribute("data-md-line"), NaN);
        if (!Number.isFinite(line) || line < 1) return;

        sendGoToLine(line);
      }

      function bindInputListeners() {
        var manualEvents = ["wheel", "touchstart", "touchmove"];
        for (var i = 0; i < manualEvents.length; i++) {
          window.addEventListener(manualEvents[i], markManualScrollIntent, { passive: true });
        }

        window.addEventListener(
          "scroll",
          function () {
            scheduleTOCActiveSync();
            if (consumeProgrammaticScroll()) return;
            markManualScrollIntent();
          },
          { passive: true }
        );

        window.addEventListener("resize", function () {
          scheduleTOCActiveSync();
        });

        window.addEventListener("keydown", function (event) {
          if (isScrollKey(event)) {
            markManualScrollIntent();
          }
        });

        root.addEventListener("click", handleWikilinkClick);
        root.addEventListener("auxclick", handleWikilinkClick);
        root.addEventListener("click", handleHashLinkClick);
        root.addEventListener("click", handleCheckboxClick);
        root.addEventListener("click", handleCodeLangClick);
        root.addEventListener("click", handleHeadingClick);
        root.addEventListener("dblclick", handlePreviewDoubleClick);

        if (tocEl) {
          tocEl.addEventListener("click", handleTOCClick);
        }
      }

      bindInputListeners();
      updateTitle();
      connect();
    })();
  </script>
</body>
</html>
